# Rooms bundle: static export + relay WebSocket on the same origin.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    proxy_pass http://127.0.0.1:4500/healthz;
  }

  # Encrypted CRDT sync — WebSocket, long-lived. CF-Connecting-IP passes
  # through untouched so the relay's per-IP caps still see real client IPs.
  location = /sync {
    proxy_pass http://127.0.0.1:4500;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
  }

  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker must revalidate so app updates reach installed PWAs.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Update beacon — the app polls this against its baked-in build version.
  location = /version.json {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;
}
